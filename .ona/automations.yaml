tasks:
  installDeps:
    name: Install dependencies
    description: Install npm dependencies.
    command: npm install
    triggeredBy:
      - postDevcontainerStart

services:
  dev-server:
    name: Dev Server
    description: SvelteKit dev server.
    commands:
      start: npm run dev -- --host 0.0.0.0 --port 5173
      ready: curl -f http://localhost:5173
